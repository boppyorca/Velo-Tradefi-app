# ============================================================
# VeloTradeFi Docker Compose
# Local development with all services
# ============================================================

services:
  # ── ASP.NET Core Backend ──────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: velotradefi-backend
    ports:
      - "5050:8080"
    env_file:
      - ./backend/.env
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      # CORS
      - FRONTEND_URL=http://localhost:3030
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ml-service:
        condition: service_started
    networks:
      - velotradefi-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Python ML Service ─────────────────────────────────────
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: velotradefi-ml
    ports:
      - "8080:8000"
    environment:
      - PYTHON_ENV=production
      - MODEL_DIR=/app/models
    volumes:
      # Mount models directory for production
      - ./ml-service/models:/app/models:ro
    networks:
      - velotradefi-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── PostgreSQL Database ────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: velotradefi-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=velotradefi
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Run initial migration (local standalone schema — no Supabase auth.uid())
      - ./backend/migrations/001_InitialSchema.Local.sql:/docker-entrypoint-initdb.d/001_InitialSchema.Local.sql:ro
    networks:
      - velotradefi-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d velotradefi"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis Cache ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: velotradefi-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - velotradefi-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Frontend (Next.js) ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_INTERNAL_URL: http://backend:8080
    container_name: velotradefi-frontend
    ports:
      - "3030:3000"
    environment:
      - NODE_ENV=production
      # Browser uses same-origin /api/* → Next rewrites to backend (see Dockerfile BACKEND_INTERNAL_URL)
      - BACKEND_INTERNAL_URL=http://backend:8080
      - NEXT_PUBLIC_WS_URL=ws://localhost:5050
    env_file:
      - ./frontend/.env.production
    depends_on:
      - backend
    networks:
      - velotradefi-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

# ── Networks ─────────────────────────────────────────────────
networks:
  velotradefi-network:
    driver: bridge

# ── Volumes ──────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
