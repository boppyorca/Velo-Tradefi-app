# ============================================================
# VeloTradeFi Docker Compose
# Local development with all services
# ============================================================

services:
  # ── ASP.NET Core Backend ──────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: velotradefi-backend
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      # Supabase
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/velotradefi}
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:-}
      # Redis
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      # JWT
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-VeloFinAI-SuperSecretKey-32chars-min!}
      # ML Service
      - PYTHON_AI_SERVICE_URL=http://ml-service:8000
      # CORS
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ml-service:
        condition: service_started
    networks:
      - velotradefi-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Python ML Service ─────────────────────────────────────
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: velotradefi-ml
    ports:
      - "8000:8000"
    environment:
      - PYTHON_ENV=production
      - MODEL_DIR=/app/models
    volumes:
      # Mount models directory for production
      - ./ml-service/models:/app/models:ro
    networks:
      - velotradefi-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── PostgreSQL Database ────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: velotradefi-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=velotradefi
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Run initial migration
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - velotradefi-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d velotradefi"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis Cache ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: velotradefi-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - velotradefi-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Frontend (Next.js) ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: velotradefi-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://backend:8080
      - NEXT_PUBLIC_WS_URL=ws://localhost:8080
    env_file:
      - ./frontend/.env.production
    depends_on:
      - backend
    networks:
      - velotradefi-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

# ── Networks ─────────────────────────────────────────────────
networks:
  velotradefi-network:
    driver: bridge

# ── Volumes ──────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
